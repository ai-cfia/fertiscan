# Reusable workflow for frontend lint, test, and SBOM checks.
# Called by ci.yml
name: Frontend

on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm ci
      - name: Check if test script exists
        id: check-tests
        run: |
          if npm run test --if-present 2>&1 | grep -q "Missing script"; then
            echo "has_tests=false" >> $GITHUB_OUTPUT
            echo "## ⚠️ No test script configured" >> $GITHUB_STEP_SUMMARY
            echo "Add a test script to package.json (e.g., vitest) to enable this check." >> $GITHUB_STEP_SUMMARY
          else
            echo "has_tests=true" >> $GITHUB_OUTPUT
          fi
      - name: Run tests
        if: steps.check-tests.outputs.has_tests == 'true'
        run: npm test

  sbom-check:
    name: SBOM Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm ci
      - name: Generate new SBOM
        run: |
          npx @cyclonedx/cyclonedx-npm package-lock.json \
            --output-reproducible --package-lock-only -v --sv 1.6 -o sbom-new.json
          echo "" >> sbom-new.json
      - name: Check if SBOM needs update
        id: sbom-check
        run: |
          if [ ! -f sbom.json ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "## SBOM Creation Required" >> $GITHUB_STEP_SUMMARY
            echo "Run: make frontend-generate-sbom" >> $GITHUB_STEP_SUMMARY
          elif ! cmp -s sbom.json sbom-new.json; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "## SBOM Update Required" >> $GITHUB_STEP_SUMMARY
            echo "Run: make frontend-generate-sbom" >> $GITHUB_STEP_SUMMARY
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "## ✅ SBOM is up to date" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Show diff if needed
        if: steps.sbom-check.outputs.needs_update == 'true'
        run: diff sbom.json sbom-new.json || true
      - name: Fail if SBOM needs update
        if: steps.sbom-check.outputs.needs_update == 'true'
        run: exit 1

  sbom-scan:
    name: SBOM Scan
    needs: sbom-check
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Check SBOM exists
        run: |
          if [ ! -f frontend/sbom.json ]; then
            echo "SBOM not found, skipping scan"
            exit 0
          fi
      - name: SBOM security scan
        id: scan
        uses: anchore/scan-action@40a61b52209e9d50e87917c5b901783d546b12d0
        with:
          sbom: frontend/sbom.json
          fail-build: false
      - name: Fix SARIF locations
        run: |
          jq '
            .runs[].results[] |= (
              .locations = [{
                "physicalLocation": {
                  "artifactLocation": {
                    "uri": "frontend/sbom.json",
                    "uriBaseId": "%SRCROOT%"
                  },
                  "region": { "startLine": 1, "startColumn": 1, "endLine": 1, "endColumn": 1 }
                }
              }]
            )
          ' "${{ steps.scan.outputs.sarif }}" > sarif-fixed.json
          mv sarif-fixed.json "${{ steps.scan.outputs.sarif }}"
      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: frontend-sbom-security-scan

  markdown-check:
    name: Markdown Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: "frontend/**/*.md"
      - uses: tcort/github-action-markdown-link-check@v1
        with:
          folder-path: frontend

  get-version:
    name: Get Version
    needs: [lint, test]
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.version.outputs.app-version }}
    steps:
      - uses: actions/checkout@v6
      - name: Parse version from package.json
        id: version
        working-directory: frontend
        run: |
          version=$(jq -r '.version' package.json)
          echo "app-version=$version" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build and Push
    needs: get-version
    uses: ai-cfia/github-workflows/.github/workflows/workflow-build-push-container-github-registry-mono.yml@main
    with:
      working-directory: frontend
      container-name: ${{ github.event.repository.name }}-frontend
      tag: ${{ github.sha }}
      release-version: ${{ needs.get-version.outputs.app-version }}
      registry: ghcr.io/ai-cfia
    secrets: inherit
