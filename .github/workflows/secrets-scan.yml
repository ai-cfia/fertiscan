# Scans for secrets.
# Called by ci.yml
name: Secrets Scan

on:
  workflow_call:

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: trufflesecurity/trufflehog@e48f9039c82786db50685e8ef7d980b209f06186
        with:
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --results=verified,unknown
