# Scans for secrets.
# Called by ci.yml
name: Secrets Scan

on:
  workflow_call:

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: trufflesecurity/trufflehog@61d57c10a563ba8a33a4c4205c85b5b3505a050e
        with:
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --results=verified,unknown
