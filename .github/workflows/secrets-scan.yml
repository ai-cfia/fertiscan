# Scans for secrets.
# Called by ci.yml
name: Secrets Scan

on:
  workflow_call:

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: trufflesecurity/trufflehog@bff3d2670b362bbb4a0bcdeffea146cbc2ad3abd
        with:
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --results=verified,unknown
