# Scans for secrets.
# Called by ci.yml
name: Secrets Scan

on:
  workflow_call:

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: trufflesecurity/trufflehog@586f66d7886cd0b037c7c245d4a6e34ef357ab10
        with:
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --results=verified,unknown
