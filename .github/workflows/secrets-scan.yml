# Scans for secrets.
# Called by ci.yml
name: Secrets Scan

on:
  workflow_call:

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: trufflesecurity/trufflehog@03acc788f836627f46bda2bdb7bf4e2b0ca0217f
        with:
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --results=verified,unknown
