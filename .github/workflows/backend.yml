# Reusable workflow for backend lint, test, SBOM checks, and deploy.
# Called by ci.yml
name: Backend

on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.15"
      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-groups
      - name: Run linting
        working-directory: backend
        run: bash scripts/lint.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      ENVIRONMENT: testing
      SECRET_KEY: test-secret-key-min-32-chars-long-for-testing
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      POSTGRES_SERVER: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changethis
      POSTGRES_DB: app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.15"
      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-groups
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm install -g mjml
      - name: Build email templates
        working-directory: backend
        run: bash scripts/build-email-templates.sh
      - name: Run tests with coverage
        working-directory: backend
        run: bash scripts/test-cov.sh

  sbom-check:
    name: SBOM Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --group dev --group sbom
      - name: Generate new SBOM
        run: |
          uv run cyclonedx-py environment --output-reproducible -v --sv 1.6 \
            --pyproject pyproject.toml -o sbom-new.json && echo "" >> sbom-new.json
      - name: Check if SBOM needs update
        id: sbom-check
        run: |
          if [ ! -f sbom.json ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "## SBOM Creation Required" >> $GITHUB_STEP_SUMMARY
            echo "Run: make backend-generate-sbom" >> $GITHUB_STEP_SUMMARY
          elif ! cmp -s sbom.json sbom-new.json; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "## SBOM Update Required" >> $GITHUB_STEP_SUMMARY
            echo "Run: make backend-generate-sbom" >> $GITHUB_STEP_SUMMARY
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "## ✅ SBOM is up to date" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Show diff if needed
        if: steps.sbom-check.outputs.needs_update == 'true'
        run: diff sbom.json sbom-new.json || true
      - name: Fail if SBOM needs update
        if: steps.sbom-check.outputs.needs_update == 'true'
        run: exit 1

  sbom-scan:
    name: SBOM Scan
    needs: sbom-check
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Check SBOM exists
        run: |
          if [ ! -f backend/sbom.json ]; then
            echo "SBOM not found, skipping scan"
            exit 0
          fi
      - name: SBOM security scan
        id: scan
        uses: anchore/scan-action@40a61b52209e9d50e87917c5b901783d546b12d0
        with:
          sbom: backend/sbom.json
          fail-build: false
      - name: Fix SARIF locations
        run: |
          jq '
            .runs[].results[] |= (
              .locations = [{
                "physicalLocation": {
                  "artifactLocation": {
                    "uri": "backend/sbom.json",
                    "uriBaseId": "%SRCROOT%"
                  },
                  "region": { "startLine": 1, "startColumn": 1, "endLine": 1, "endColumn": 1 }
                }
              }]
            )
          ' "${{ steps.scan.outputs.sarif }}" > sarif-fixed.json
          mv sarif-fixed.json "${{ steps.scan.outputs.sarif }}"
      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: backend-sbom-security-scan

  markdown-check:
    name: Markdown Check
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: "backend/**/*.md !backend/legacy/**"
      - uses: tcort/github-action-markdown-link-check@v1
        with:
          folder-path: backend

  version-bump:
    name: Version Bump
    needs: [lint, test]
    uses: ai-cfia/github-workflows/.github/workflows/workflow-version-bump-python-mono.yml@main
    secrets: inherit
    with:
      pyproject-path: "pyproject.toml"
      package-name: "fertiscan-backend"
      working-directory: backend

  get-version:
    name: Get Version
    needs: version-bump
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.version.outputs.app-version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Parse version from pyproject.toml
        id: version
        working-directory: backend
        run: |
          version=$(grep -Po '(?<=^version = ")[^"]*' pyproject.toml)
          echo "app-version=$version" >> $GITHUB_OUTPUT

  build-and-push:
    name: Build and Push
    needs: get-version
    uses: ai-cfia/github-workflows/.github/workflows/workflow-build-push-container-github-registry-mono.yml@main
    with:
      working-directory: backend
      container-name: ${{ github.event.repository.name }}-backend
      tag: ${{ github.sha }}
      release-version: ${{ needs.get-version.outputs.app-version }}
      registry: ghcr.io/ai-cfia
    secrets: inherit
