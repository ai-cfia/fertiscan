# Reusable workflow for backend SBOM check and scan.
# Called by ci.yml after backend lint/test pass.
name: Backend SBOM

on:
  workflow_call:
    inputs:
      should_scan:
        description: Run the backend SBOM scan or upload an empty SARIF placeholder.
        required: false
        type: boolean
        default: true

jobs:
  sbom-check:
    name: SBOM Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      security-events: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        if: ${{ inputs.should_scan }}
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v7
        if: ${{ inputs.should_scan }}
      - name: Install dependencies
        if: ${{ inputs.should_scan }}
        run: uv sync --group dev --group sbom
      - name: Generate SBOM
        if: ${{ inputs.should_scan }}
        run: |
          uv run cyclonedx-py environment --output-reproducible -v --sv 1.6 \
            --pyproject pyproject.toml -o sbom.json && echo "" >> sbom.json
      - name: SBOM security scan
        if: ${{ inputs.should_scan }}
        id: scan
        uses: anchore/scan-action@ba2e18e34737763b9c92004dfe2afbcbd2d6207d
        with:
          sbom: backend/sbom.json
          fail-build: false
      - name: Fix SARIF locations
        if: ${{ inputs.should_scan }}
        run: |
          jq '
            .runs[].results[] |= (
              .locations = [{
                "physicalLocation": {
                  "artifactLocation": {
                    "uri": "backend/sbom.json",
                    "uriBaseId": "%SRCROOT%"
                  },
                  "region": { "startLine": 1, "startColumn": 1, "endLine": 1, "endColumn": 1 }
                }
              }]
            )
          ' "${{ steps.scan.outputs.sarif }}" > sarif-fixed.json
          mv sarif-fixed.json "${{ steps.scan.outputs.sarif }}"
      - name: Create empty SARIF when scan is skipped
        if: ${{ !inputs.should_scan }}
        run: |
          cat > empty.sarif <<'EOF'
          {
            "version": "2.1.0",
            "runs": [
              {
                "tool": {
                  "driver": {
                    "name": "grype",
                    "informationUri": "https://github.com/anchore/grype",
                    "rules": []
                  }
                },
                "results": []
              }
            ]
          }
          EOF
      - name: Upload scan results
        if: ${{ inputs.should_scan }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: backend-sbom-security-scan
      - name: Upload empty scan results
        if: ${{ !inputs.should_scan }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: empty.sarif
          category: backend-sbom-security-scan
