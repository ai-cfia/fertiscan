# Reusable workflow for backend SBOM check and scan.
# Called by ci.yml after backend lint/test pass.
name: Backend SBOM

on:
  workflow_call:

jobs:
  sbom-check:
    name: SBOM Check
    uses: ai-cfia/github-workflows/.github/workflows/workflow-generate-backend-sbom.yml@main
    with:
      working-directory: ./backend
      runs-on: ubuntu-24.04
      cyclonedx-spec-version: "1.6"
    secrets: inherit
  rename-and-upload:
    name: Upload Backend SBOM Scan
    needs: sbom-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect backend SARIF
        run: |
          echo "Searching for backend SARIF..."
          find . -type f -name "*.sarif"

          SARIF_FILE=$(find . -type f -name "*backend*.sarif" | head -n 1)

          if [ -z "$SARIF_FILE" ]; then
            echo "❌ No backend SARIF found"
            exit 1
          fi

          echo "✅ Backend SARIF found: $SARIF_FILE"
          echo "BACKEND_SARIF_FILE=$SARIF_FILE" >> $GITHUB_ENV

      - name: Normalize backend SARIF filename
        run: |
          mkdir -p backend
          mv "$BACKEND_SARIF_FILE" backend/backend-sbom-security-scan.sarif

      - name: Upload backend SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend/backend-sbom-security-scan.sarif
