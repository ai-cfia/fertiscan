name: Fertiscan backend workflows

on:
  pull_request:
    types:
      - opened
      - closed
      - synchronize
    paths:
      - "backend/**"
      - ".github/workflows/fertiscan-backend-workflows.yaml"

jobs:
  # lint-test:
  #   uses: ai-cfia/github-workflows/.github/workflows/workflow-lint-test-python.yml@main
  #   secrets: inherit
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.15"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-groups

      - name: Run linting
        working-directory: backend
        run: bash scripts/lint.sh

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: changethis
          POSTGRES_DB: app
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      ENVIRONMENT: testing
      SECRET_KEY: test-secret-key-min-32-chars-long-for-testing
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: changethis
      POSTGRES_SERVER: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changethis
      POSTGRES_DB: app

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.15"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-groups

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install MJML
        run: npm install -g mjml

      - name: Build email templates
        working-directory: backend
        run: bash scripts/build-email-templates.sh

      - name: Run tests with coverage
        working-directory: backend
        run: bash scripts/test-cov.sh

  markdown-check:
    uses: ai-cfia/github-workflows/.github/workflows/workflow-markdown-check.yml@main
    secrets: inherit

  repo-standard:
    uses: ai-cfia/github-workflows/.github/workflows/workflow-repo-standards-validation.yml@main
    secrets: inherit

  deploy-to-ghcr:
    uses: ai-cfia/github-workflows/.github/workflows/workflow-build-push-container-github-registry.yml@main
    with:
      container-name: ${{ github.event.repository.name }}
      tag: ${{ github.sha }}
      registry: ghcr.io/ai-cfia
      dockerfile-folder-path: backend
    secrets: inherit

  pr-labelling:
    uses: ai-cfia/github-workflows/.github/workflows/workflow-pr-labelling.yml@main
    secrets: inherit
