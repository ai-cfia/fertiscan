# Reusable workflow for frontend SBOM check and scan.
# Called by ci.yml after frontend lint/test pass.
name: Frontend SBOM

on:
  workflow_call:

jobs:
  sbom-generation:
    uses: ai-cfia/github-workflows/.github/workflows/workflow-generate-frontend-sbom.yml@main
    secrets: inherit

  sbom-scan:
    name: SBOM Scan
    needs: sbom-generation
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Check SBOM exists
        run: |
          if [ ! -f frontend/sbom.json ]; then
            echo "SBOM not found, skipping scan"
            exit 0
          fi
      - name: SBOM security scan
        id: scan
        uses: anchore/scan-action@f63dc5910033de4782c37de5c6d7c7767852844e
        with:
          sbom: frontend/sbom.json
          fail-build: false
      - name: Fix SARIF locations
        run: |
          jq '
            .runs[].results[] |= (
              .locations = [{
                "physicalLocation": {
                  "artifactLocation": {
                    "uri": "frontend/sbom.json",
                    "uriBaseId": "%SRCROOT%"
                  },
                  "region": { "startLine": 1, "startColumn": 1, "endLine": 1, "endColumn": 1 }
                }
              }]
            )
          ' "${{ steps.scan.outputs.sarif }}" > sarif-fixed.json
          mv sarif-fixed.json "${{ steps.scan.outputs.sarif }}"
      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: frontend-sbom-security-scan
