# Reusable workflow for frontend SBOM check and scan.
# Called by ci.yml after frontend lint/test pass.
name: Frontend SBOM

on:
  workflow_call:

jobs:
  sbom-check:
    name: SBOM Check
    uses: ai-cfia/github-workflows/.github/workflows/workflow-generate-frontend-sbom.yml@main
    with:
      working-directory: ./frontend
      runs-on: ubuntu-24.04
      cyclonedx-spec-version: "1.6"
    secrets: inherit

  rename-and-upload:
    name: Upload Frontend SBOM Scan
    needs: sbom-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect SARIF output (frontend)
        run: |
          echo "Searching for SARIF files..."
          find . -type f -name "*.sarif"

          SARIF_FILE=$(find . -type f -name "*frontend*.sarif" | head -n 1)

          if [ -z "$SARIF_FILE" ]; then
            echo "❌ No SARIF file generated by scan"
            exit 1
          fi

          echo "✅ Found SARIF at: $SARIF_FILE"
          echo "SARIF_FILE=$SARIF_FILE" >> $GITHUB_ENV

      - name: Normalize frontend SARIF filename
        run: |
          mkdir -p frontend
          mv "$SARIF_FILE" frontend/frontend-sbom-security-scan.sarif

      - name: Upload frontend SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend/frontend-sbom-security-scan.sarif
