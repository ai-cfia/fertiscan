# Reusable workflow for frontend SBOM check and scan.
# Called by ci.yml after frontend lint/test pass.
name: Frontend SBOM

on:
  workflow_call:

jobs:
  sbom-check:
    name: SBOM Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      security-events: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm ci
      - name: Generate SBOM
        run: |
          npx @cyclonedx/cyclonedx-npm package-lock.json \
            --output-reproducible --package-lock-only -v --sv 1.6 -o sbom.json
          echo "" >> sbom.json
      - name: SBOM security scan
        id: scan
        uses: anchore/scan-action@daeb723982a29db0a021b5fa3af65d08e1f891c8
        with:
          sbom: frontend/sbom.json
          fail-build: false
      - name: Fix SARIF locations
        run: |
          jq '
            .runs[].results[] |= (
              .locations = [{
                "physicalLocation": {
                  "artifactLocation": {
                    "uri": "frontend/sbom.json",
                    "uriBaseId": "%SRCROOT%"
                  },
                  "region": { "startLine": 1, "startColumn": 1, "endLine": 1, "endColumn": 1 }
                }
              }]
            )
          ' "${{ steps.scan.outputs.sarif }}" > sarif-fixed.json
          mv sarif-fixed.json "${{ steps.scan.outputs.sarif }}"
      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: frontend-sbom-security-scan
