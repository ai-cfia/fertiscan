# Reusable workflow for frontend SBOM check and scan.
# Called by ci.yml after frontend lint/test pass.
name: Frontend SBOM

on:
  workflow_call:

jobs:
  sbom-check:
    name: SBOM Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: npm ci
      - name: Generate new SBOM
        run: |
          npx @cyclonedx/cyclonedx-npm package-lock.json \
            --output-reproducible --package-lock-only -v --sv 1.6 -o sbom-new.json
          echo "" >> sbom-new.json
      - name: Check if SBOM needs update
        id: sbom-check
        run: |
          if [ ! -f sbom.json ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "## SBOM Creation Required" >> $GITHUB_STEP_SUMMARY
            echo "Run: make frontend-generate-sbom" >> $GITHUB_STEP_SUMMARY
          elif ! cmp -s sbom.json sbom-new.json; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "## SBOM Update Required" >> $GITHUB_STEP_SUMMARY
            echo "Run: make frontend-generate-sbom" >> $GITHUB_STEP_SUMMARY
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "## ✅ SBOM is up to date" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Show diff if needed
        if: steps.sbom-check.outputs.needs_update == 'true'
        run: diff sbom.json sbom-new.json || true
      - name: Fail if SBOM needs update
        if: steps.sbom-check.outputs.needs_update == 'true'
        run: exit 1

  sbom-scan:
    name: SBOM Scan
    needs: sbom-check
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Check SBOM exists
        run: |
          if [ ! -f frontend/sbom.json ]; then
            echo "SBOM not found, skipping scan"
            exit 0
          fi
      - name: SBOM security scan
        id: scan
        uses: anchore/scan-action@40a61b52209e9d50e87917c5b901783d546b12d0
        with:
          sbom: frontend/sbom.json
          fail-build: false
      - name: Fix SARIF locations
        run: |
          jq '
            .runs[].results[] |= (
              .locations = [{
                "physicalLocation": {
                  "artifactLocation": {
                    "uri": "frontend/sbom.json",
                    "uriBaseId": "%SRCROOT%"
                  },
                  "region": { "startLine": 1, "startColumn": 1, "endLine": 1, "endColumn": 1 }
                }
              }]
            )
          ' "${{ steps.scan.outputs.sarif }}" > sarif-fixed.json
          mv sarif-fixed.json "${{ steps.scan.outputs.sarif }}"
      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: frontend-sbom-security-scan
