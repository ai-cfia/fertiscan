# Reusable workflow for frontend SBOM check and scan.
# Called by ci.yml after frontend lint/test pass.
name: Frontend SBOM

on:
  workflow_call:

jobs:
  sbom-check:
    name: SBOM Check
    uses: ai-cfia/github-workflows/.github/workflows/workflow-generate-frontend-sbom.yml@main
    with:
      working-directory: ./frontend
      runs-on: ubuntu-24.04
      cyclonedx-spec-version: "1.6"
    secrets: inherit

  rename-and-upload:
    name: Upload Frontend SBOM Scan
    needs: sbom-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rename frontend SARIF
        run: |
          # Le workflow réutilisable génère frontend/grype.sarif
          mv frontend/grype.sarif frontend/grype-frontend.sarif

      - name: Upload frontend SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: frontend/grype-frontend.sarif
