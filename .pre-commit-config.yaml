# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
exclude: ^backend/app/data/
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: |
          (?x)^(
            backend/app/email-templates/build/.*|
            backend/alembic/versions/.*|
            frontend/sbom\.json|
            backend/sbom\.json
          )$
      - id: trailing-whitespace
        exclude: ^backend/alembic/versions/
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        exclude: ^backend/(template|alembic|tests)/
        files: ^backend/
        additional_dependencies:
          - types-passlib
          - types-jinja2
          - types-PyJWT
          - sqlmodel
          - pydantic
          - pydantic-settings
          - fastapi
          - asyncpg
          - python-dotenv
          - jinja2
          - tenacity
          - aiosmtplib
          - boto3-stubs[s3]
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd backend && bash scripts/format.sh'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: alembic-check
        name: Alembic check
        entry: bash -c 'cd backend && uv run alembic check'
        language: system
        files: ^backend/(alembic\.ini|alembic/.*|app/db/models/.*|app/db/base\.py)
        pass_filenames: false
      - id: biome-check
        name: Biome check
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/
        pass_filenames: false
      - id: typescript-check
        name: TypeScript check
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/.*\.(ts|tsx)$
        pass_filenames: false
